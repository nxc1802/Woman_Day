<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Memories 📸</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/gallery.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
</head>
<body>

  <!-- Ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Back button -->
  <a href="../home.html" class="back-btn">← Back</a>

  <div class="page-wrapper gallery-wrapper">

    <!-- Header -->
    <header class="gallery-header" id="galleryHeader">
      <h1 class="page-title">Our Memories</h1>
      <p class="page-subtitle">Every photo, a story worth keeping</p>
    </header>

    <!-- Tab filter -->
    <div class="gallery-tabs" id="galleryTabs">
      <button class="tab-btn active" data-filter="all" onclick="filterGallery('all', this)">All ❤️</button>
      <button class="tab-btn" data-filter="solo" onclick="filterGallery('solo', this)">Hong 🌸</button>
      <button class="tab-btn" data-filter="couple" onclick="filterGallery('couple', this)">Us 💕</button>
    </div>

    <!-- Stats bar -->
    <div class="gallery-stats glass-card" id="galleryStats">
      <div class="stat-item">
        <span class="stat-num" id="statCount">—</span>
        <span class="stat-label">Moments</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-num">∞</span>
        <span class="stat-label">Memories</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-num">1</span>
        <span class="stat-label">You</span>
      </div>
    </div>

    <!-- Gallery grid (rendered by JS) -->
    <div class="gallery-grid" id="galleryGrid"></div>

    <!-- Footer quote -->
    <div class="gallery-quote" id="galleryQuote">
      <p>"Every moment with you is my favorite moment." 💕</p>
    </div>

  </div>

  <!-- Lightbox -->
  <div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <button class="lb-nav lb-prev" onclick="lbNav(-1); event.stopPropagation()">‹</button>
    <button class="lb-nav lb-next" onclick="lbNav(1); event.stopPropagation()">›</button>
    <div class="lb-img-wrap" onclick="event.stopPropagation()">
      <img src="" alt="" id="lbImage" />
      <p class="lb-caption" id="lbCaption"></p>
    </div>
  </div>

  <!-- AOS + GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="../js/gallery.js"></script>
</body>
</html>
