<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Songs 🎵</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/music.css" />
</head>
<body>

  <!-- Ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Music visualizer background -->
  <div class="viz-bg" id="vizBg"></div>

  <!-- Back button -->
  <a href="../home.html" class="back-btn">← Back</a>

  <div class="page-wrapper music-wrapper">

    <!-- Header -->
    <header class="text-center" id="musicHeader">
      <h1 class="page-title">Our Songs</h1>
      <p class="page-subtitle">Songs that remind me of you</p>
    </header>

    <!-- Now Playing -->
    <div class="now-playing glass-card" id="nowPlaying">
      <div class="np-vinyl" id="npVinyl">
        <div class="vinyl-outer">
          <div class="vinyl-inner">
            <img src="../assets/images/gf1.jpg" alt="Now playing" id="npCover" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect width=%22200%22 height=%22200%22 fill=%22%23330d1a%22/><text x=%22100%22 y=%22108%22 font-size=%2248%22 text-anchor=%22middle%22>🎵</text></svg>'" />
          </div>
        </div>
        <!-- Ripple rings -->
        <div class="vinyl-ring ring-1"></div>
        <div class="vinyl-ring ring-2"></div>
        <div class="vinyl-ring ring-3"></div>
      </div>

      <div class="np-info">
        <h2 class="np-title" id="npTitle">Select a song</h2>
        <p class="np-artist" id="npArtist">— tap a song below to play —</p>

        <!-- Progress bar -->
        <div class="progress-wrap">
          <span class="time-current" id="timeCurrent">0:00</span>
          <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
            <div class="progress-thumb" id="progressThumb"></div>
          </div>
          <span class="time-total" id="timeTotal">0:00</span>
        </div>

        <!-- Controls -->
        <div class="np-controls">
          <button class="ctrl-btn" id="btnPrev" title="Previous" onclick="prevSong()">⏮</button>
          <button class="ctrl-btn ctrl-play" id="btnPlay" title="Play/Pause" onclick="togglePlay()">▶</button>
          <button class="ctrl-btn" id="btnNext" title="Next" onclick="nextSong()">⏭</button>
        </div>
      </div>
    </div>

    <!-- Playlist -->
    <div class="playlist" id="playlist">
      <!-- Songs are rendered by JS -->
    </div>

  </div>

  <!-- Howler.js + GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="../js/music.js"></script>
</body>
</html>
