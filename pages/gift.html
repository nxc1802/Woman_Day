<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Gift to You 🎁</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/gift.css" />
</head>
<body>

  <!-- Back button -->
  <a href="../home.html" class="back-btn">← Back</a>

  <!-- Full-screen canvas for snow + particles -->
  <canvas id="snowCanvas"></canvas>

  <!-- Falling love messages container -->
  <div id="loveMessages"></div>

  <!-- Main gift content -->
  <div class="gift-wrapper" id="giftWrapper">

    <!-- Photo frame -->
    <div class="photo-frame animate-glow" id="photoFrame">
      <div class="photo-ring ring-outer"></div>
      <div class="photo-ring ring-middle"></div>
      <div class="photo-inner">
        <img
          src="../assets/images/gf1.jpg"
          alt="My love"
          id="giftPhoto"
          onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22300%22><rect width=%22300%22 height=%22300%22 fill=%22%23330d1a%22/><text x=%22150%22 y=%22158%22 font-size=%2280%22 text-anchor=%22middle%22>🌸</text></svg>'"
        />
      </div>
      <div class="photo-hearts">
        <span class="ph-heart" style="--delay:0s">❤️</span>
        <span class="ph-heart" style="--delay:0.5s">💕</span>
        <span class="ph-heart" style="--delay:1s">💗</span>
        <span class="ph-heart" style="--delay:1.5s">✨</span>
      </div>
    </div>

    <!-- Text card -->
    <div class="gift-card glass-card" id="giftCard">
      <div class="gift-card-top">🎁</div>
      <h1 class="gift-title">Happy Women's Day</h1>
      <p class="gift-date">March 8, 2025</p>
      <p class="gift-message">
        This little website is my heart, wrapped up just for you.<br/>
        Thank you for being my sunshine every single day. 🌸
      </p>
      <div class="gift-hearts">
        <span class="animate-heartbeat" style="display:inline-block; font-size:1.8rem">❤️</span>
        <span class="animate-heartbeat" style="display:inline-block; font-size:1.4rem; animation-delay:0.3s">💕</span>
        <span class="animate-heartbeat" style="display:inline-block; font-size:1.8rem; animation-delay:0.6s">❤️</span>
      </div>
    </div>

  </div>

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="../js/snow.js"></script>
</body>
</html>
