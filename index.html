<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For My Love 💕</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/password.css" />
</head>
<body>

  <!-- Ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Floating hearts background -->
  <div class="hearts-bg" id="heartsBg"></div>

  <!-- Heart explosion container -->
  <div class="explosion-container" id="explosionContainer"></div>

  <!-- Lock Screen -->
  <div class="page-wrapper" id="lockScreen">
    <div class="lock-card glass-card" id="lockCard">

      <!-- Icon -->
      <div class="lock-icon animate-float" id="lockIcon">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 10 C35 10, 22 23, 22 38 L22 45 C16 45, 12 49, 12 55 L12 82 C12 88, 16 92, 22 92 L78 92 C84 92, 88 88, 88 82 L88 55 C88 49, 84 45, 78 45 L78 38 C78 23, 65 10, 50 10 Z M50 20 C60 20, 68 28, 68 38 L68 45 L32 45 L32 38 C32 28, 40 20, 50 20 Z"
                fill="url(#lockGrad)" />
          <defs>
            <linearGradient id="lockGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ff6b81"/>
              <stop offset="100%" stop-color="#ff4d6d"/>
            </linearGradient>
          </defs>
          <circle cx="50" cy="66" r="7" fill="rgba(255,245,247,0.9)"/>
          <rect x="47" y="66" width="6" height="10" rx="3" fill="rgba(255,245,247,0.9)"/>
        </svg>
      </div>

      <h1 class="lock-title">For My Love</h1>
      <p class="lock-subtitle">Enter the password to open your gift 💕</p>

      <!-- Input group -->
      <div class="input-group" id="inputGroup">
        <input
          type="password"
          id="passwordInput"
          class="password-input"
          placeholder="Your secret password..."
          maxlength="30"
          autocomplete="off"
          spellcheck="false"
        />
        <div class="input-focus-line"></div>
      </div>

      <!-- Error message -->
      <p class="error-msg hidden" id="errorMsg">
        <span>💔</span> Wrong password, try again...
      </p>

      <!-- Unlock button -->
      <button class="btn-pink unlock-btn" id="unlockBtn" onclick="checkPassword()">
        <span class="btn-text">Unlock ✨</span>
      </button>

      <!-- Hint -->
      <p class="hint-text">Hint: three words that mean everything 🥺</p>

    </div>
  </div>

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="js/password.js"></script>
</body>
</html>
